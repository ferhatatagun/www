name: Build and Deploy
on:
  push:
    branches:
      - master
permissions:
  contents: write
jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }} # Recommended if you intend to make multiple deployments in quick succession.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Install and Build 🔧 # This example project is built using npm and outputs the result to the 'build' folder. Replace with the commands required to build your project, or remove this step entirely if your site is pre-built.
        env:
          # Prerendering every blog post via marked now does real SSR work
          # (markdown -> HTML) for ~14 routes. Default node heap (~1.4 GB on
          # ubuntu-latest workers) was OOMing during the prerender pass.
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          yarn install --immutable --immutable-cache --check-cache
          yarn build
          touch build/.nojekyll
          # 404.html is a standalone terminal-styled page shipped from
          # static/404.html — the static adapter already copies it into
          # build/. Do NOT overwrite it with the 200.html SPA shell.

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build # The folder the action should deploy.
          branch: gh-pages
